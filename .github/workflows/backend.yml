name: Deploy Dev Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/github-actions-ssm-role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActionsWorkflow

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Build for Linux
      env:
        GOOS: linux
        GOARCH: amd64
        CGO_ENABLED: 1
      run: |
        go build -a -installsuffix cgo -o xword .
    
    - name: Copy file
      run: |
        # Update function code
        aws s3 cp xword s3://divlab-prod/xword/prod/backend/service/xword
    
    - name: Restart
      run: | 
        aws ssm send-command \
        --document-name "AWS-RunShellScript" \
        --instance-ids "${{ secrets.BACKEND_ID }}" \
        --parameters commands='[
          "sudo systemctl stop xword || true",
          "sudo aws s3 cp s3://divlab-prod/xword/prod/backend/service/xword /usr/local/bin/xword",
          "sudo chmod +x /usr/local/bin/xword",
          "sudo chown xword:xword /usr/local/bin/xword",
          "sudo systemctl start xword"  
        ]' \
        --output text
