name: Frontend Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/**

# Required for OIDC authentication
permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/github-actions-ssm-role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActionsWorkflow
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        cache-dependency-path: frontend/package-lock.json
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Build project
      working-directory: frontend
      run: npx expo export --platform web
      env:
        EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}

    - name: Copy file
      run: |
        # Update function code
        aws s3 rm s3://divlab-prod/xword/prod/frontend/dist/ --recursive
        aws s3 cp ./dist/ s3://divlab-prod/xword/prod/frontend/dist/ --recursive
    - name: Restart
      run: |
        aws ssm send-command \
        --document-name "AWS-RunShellScript" \
        --instance-ids "${{ secrets.FRONTEND_ID }}" \
        --parameters commands='[
          "sudo systemctl stop nginx",
          "sudo rm -rf /var/www/html/xword/*",
          "aws s3 cp s3://divlab-prod/xword/prod/frontend/dist/ /var/www/html/xword --recursive",
          "sudo systemctl restart nginx"
        ]' \
        --output text

